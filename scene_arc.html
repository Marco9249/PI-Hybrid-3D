<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Abstract Grid Design | Spline Hub</title>
    <script type="module" src="https://unpkg.com/@splinetool/viewer@1.9.5/build/spline-viewer.js"></script>
    <style>
        body { margin: 0; background: #000; overflow: hidden; }
        .back-btn {
            position: fixed;
            top: 30px;
            left: 30px;
            z-index: 100;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #fff;
            padding: 12px 25px;
            border-radius: 12px;
            text-decoration: none;
            font-family: 'Inter', sans-serif;
            font-size: 14px;
            transition: all 0.3s;
        }
        .back-btn:hover { background: rgba(255, 255, 255, 0.1); border-color: #06B6D4; }
    </style>
</head>
<body>
    <a href="index.html" class="back-btn">← RETURN HOME</a>
    <spline-viewer url="https://prod.spline.design/DqIqXA4OOQwaH4NN/scene.splinecode"></spline-viewer>
</body>
</html>
